<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // ==========================================
        // 🛠️ USER SETTINGS (CHANGE THESE)
        // ==========================================
        const GENDER = 'boy'; 
        const PHOTO_NAME = 'us.jpg'; 
        const PASS_CODE = 'baby'; 
        // ==========================================
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Big Secret!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; background-color: #f3eafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            text-align: center; overflow-x: hidden; transition: background-color 1.2s ease; box-sizing: border-box;
        }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* PASSWORD SCREEN */
        #password-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100%;
        }
        .password-card {
            background: white; padding: 40px 30px; border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 85%; max-width: 320px;
        }
        .password-card h2 { color: #5a4fcf; margin-bottom: 20px; font-size: 1.4rem; }
        .password-card input {
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #cbc3e3;
            font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
            text-align: center; outline: none; box-sizing: border-box; margin-bottom: 20px;
        }
        .password-card button {
            background: #5a4fcf; color: white; border: none; padding: 15px 40px;
            border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%;
        }

        /* CONTENT WRAPPER */
        #game-content { display: none; width: 100%; }

        #parents-photo { margin-top: 40px; }
        .couple-img { width: 200px; height: 200px; border-radius: 50%; border: 6px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); object-fit: cover; }
        .couple-label { margin-top: 10px; font-weight: 700; color: #7d7098; letter-spacing: 1px; font-size: 0.8rem; text-transform: uppercase; }
        h1 { color: #5a4fcf; margin: 30px 0; font-size: 1.5rem; padding: 0 10px; }
        
        .reveal-card { 
            width: 260px; height: 320px; background: white; border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; 
            border: 4px dashed #cbc3e3; margin: 0 auto; -webkit-tap-highlight-color: transparent;
        }
        
        /* SHAKE ANIMATION */
        .shake { animation: hard-shake 1.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes hard-shake {
            10%, 90% { transform: translate3d(-2px, 0, 0) rotate(-1deg); }
            20%, 80% { transform: translate3d(4px, 0, 0) rotate(2deg); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0) rotate(-3deg); }
            40%, 60% { transform: translate3d(8px, 0, 0) rotate(3deg); }
            95% { transform: translate3d(-10px, 0, 0) rotate(-4deg); }
        }

        /* MOBILE-PERFECT FANCY BADGE */
        #reveal-section { 
            display: none; width: 100%; 
            height: 70vh; /* Centers the badge vertically in the screen */
            flex-direction: column; align-items: center; justify-content: center;
        }
        
        .result-badge {
            background: white;
            position: relative;
            border: 8px solid #abd6e2; 
            border-radius: 40px; 
            /* Responsive Padding: Uses % and Viewport width */
            padding: 12% 15%; 
            display: inline-block;
            box-shadow: 0 15px 0px #abd6e2, 0 30px 50px rgba(0,0,0,0.1);
            max-width: 85vw; /* Never wider than the phone screen */
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       floating 3s ease-in-out infinite 0.8s;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .gender-result { 
            /* Fluid Font Size: Scales between 2rem and 3.5rem based on screen width */
            font-size: clamp(2rem, 10vw, 3.5rem);
            font-weight: 900; 
            color: #3498db; 
            margin: 0;
            text-shadow: 2px 2px 0px #fff;
            white-space: nowrap; /* Keeps "It's a BOY!" on one line */
        }

        /* Sparkles */
        .result-badge::before, .result-badge::after {
            content: "✨"; position: absolute; font-size: clamp(1.5rem, 5vw, 2.5rem);
            animation: twinkle 1.5s infinite alternate;
        }
        .result-badge::before { top: -15px; left: -15px; }
        .result-badge::after { bottom: -15px; right: -15px; }

        @keyframes twinkle { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        .bg-boy { background-color: #eef7ff !important; }

        #error-msg { color: #e91e63; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="password-screen">
        <div class="password-card">
            <h2>Welcome! 🐣</h2>
            <input type="text" id="passInput" placeholder="Enter secret code..." autocomplete="off" autofocus>
            <button onclick="checkPass()">Unlock Reveal</button>
            <div id="error-msg">Incorrect code. Try again!</div>
        </div>
    </div>

    <div id="game-content">
        <div class="container">
            <div id="parents-photo">
                <img id="main-photo" src="" alt="The Parents" class="couple-img">
                <div class="couple-label">The Parents-to-be</div>
            </div>

            <div id="setup-section">
                <h1>Is it a Boy or a Girl?</h1>
                <div id="card" class="reveal-card" onclick="triggerReveal()">
                    <div style="font-size:70px;">❓</div>
                    <div style="font-weight:bold; color:#7d7098; margin-top:10px; letter-spacing: 1px;">TAP TO REVEAL</div>
                </div>
            </div>

            <div id="reveal-section">
                <div class="result-badge">
                    <h2 class="gender-result">It's a BOY! 💙</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('main-photo').src = 'images/' + PHOTO_NAME;

        function checkPass() {
            const input = document.getElementById('passInput').value.toLowerCase();
            const error = document.getElementById('error-msg');
            if (input === PASS_CODE.toLowerCase()) {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('game-content').style.display = 'block';
            } else {
                error.style.display = 'block';
                document.getElementById('passInput').value = '';
            }
        }

        document.getElementById('passInput').addEventListener("keypress", (e) => { if (e.key === "Enter") checkPass(); });

        function triggerReveal() {
            const card = document.getElementById('card');
            card.classList.add('shake');
            setTimeout(() => {
                document.getElementById('setup-section').style.display = 'none';
                document.getElementById('parents-photo').style.display = 'none';
                document.body.classList.add('bg-boy');
                const revealSect = document.getElementById('reveal-section');
                revealSect.style.display = 'flex'; // Use flex to center the badge
                window.scrollTo({ top: 0, behavior: 'smooth' });
                runConfetti('#3498db', '#87ceeb');
            }, 1500); 
        }

        function runConfetti(color1, color2) {
            const defaults = { startVelocity: 45, spread: 80, ticks: 60, zIndex: 0 };
            confetti({...defaults, origin: { x: 0, y: 0.8 }, colors: [color1, color2], particleCount: 150 });
            confetti({...defaults, origin: { x: 1, y: 0.8 }, colors: [color1, color2], particleCount: 150 });
            let count = 0;
            const fireworkInterval = setInterval(() => {
                confetti({ particleCount: 50, startVelocity: 35, spread: 360, origin: { x: Math.random(), y: Math.random() - 0.2 }, colors: [color1, color2, '#fff'], shapes: ['star'] });
                count++;
                if (count > 15) clearInterval(fireworkInterval);
            }, 200);
        }
    </script>
</body>
</html>
